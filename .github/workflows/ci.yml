name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DBT_PROFILES_DIR: ${{ github.workspace }}/.github/dbt

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python sources
        run: ruff check ingestion/ scripts/ orchestration/ --ignore E501,E402

  validate-dbt:
    name: dbt Compile
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sales_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt-postgres
        run: pip install "dbt-postgres==1.8.0"

      - name: Write CI dbt profile
        run: |
          mkdir -p .github/dbt
          cat > .github/dbt/profiles.yml << 'EOF'
          sales_platform:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: postgres
                password: postgres
                dbname: sales_ci
                schema: staging
                threads: 2
          EOF

      - name: dbt deps
        run: dbt deps --project-dir dbt

      - name: dbt compile
        run: dbt compile --project-dir dbt

      - name: dbt parse (validate model SQL)
        run: dbt parse --project-dir dbt

  validate-dags:
    name: Validate Airflow DAGs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Airflow
        run: pip install -r requirements.txt

      - name: Validate DAG imports
        env:
          AIRFLOW_HOME: /tmp/airflow
        run: |
          airflow db migrate
          python - << 'EOF'
          import sys
          from airflow.models import DagBag
          bag = DagBag(dag_folder="orchestration/dags", include_examples=False)
          if bag.import_errors:
              for dag, err in bag.import_errors.items():
                  print(f"  ✗ [{dag}] {err}")
              sys.exit(1)
          print(f"  ✓ {len(bag.dags)} DAG(s) loaded successfully")
          EOF

  integration:
    name: Integration — PostgreSQL + dbt
    runs-on: ubuntu-latest
    needs: [lint, validate-dbt]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sales_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt "dbt-postgres==1.8.0"

      - name: Write CI dbt profile
        run: |
          mkdir -p .github/dbt
          cat > .github/dbt/profiles.yml << 'EOF'
          sales_platform:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: postgres
                password: postgres
                dbname: sales_platform
                schema: staging
                threads: 2
          EOF

      - name: Initialise schema
        run: psql postgresql://postgres:postgres@localhost:5432/postgres -f scripts/init_db.sql

      - name: Run ingestion
        env:
          DBT_HOST: localhost
          DBT_PORT: 5432
          DBT_USER: postgres
          DBT_PASSWORD: postgres
          DBT_DBNAME: sales_platform
        run: python ingestion/load_sales.py --file data/sample/sales_sample.csv

      - name: dbt run
        run: dbt run --project-dir dbt

      - name: Smoke test
        env:
          DBT_HOST: localhost
          DBT_PORT: 5432
          DBT_USER: postgres
          DBT_PASSWORD: postgres
          DBT_DBNAME: sales_platform
        run: python scripts/smoke_test.py

  docker:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate compose syntax
        run: docker compose config -q
