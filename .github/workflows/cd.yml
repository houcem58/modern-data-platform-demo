name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-docs:
    name: Deploy dbt Docs → GitHub Pages
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install "dbt-postgres==1.8.0" "dbt-core>=1.8.0,<1.9.0"

      - name: Write dbt profile
        run: |
          mkdir -p .github/dbt
          cat > .github/dbt/profiles.yml << 'EOF'
          sales_platform:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: postgres
                password: postgres
                dbname: sales_ci
                schema: staging
                threads: 2
          EOF

      - name: Generate dbt docs
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/.github/dbt
          DBT_ALLOW_EXPERIMENTAL_ADAPTERS: "true"
        run: |
          dbt deps --project-dir dbt
          dbt docs generate --project-dir dbt --empty-catalog

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dbt/target
          publish_branch: gh-pages
